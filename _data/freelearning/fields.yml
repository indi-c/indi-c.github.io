- id: web
  domain: cs
  title: web development
  brief: Learn how to build websites and web applications using HTML, CSS, JavaScript, and other web technologies.
  description: Web development is the process of creating websites and web applications. It involves a combination of programming languages, frameworks, and tools to build functional and visually appealing web experiences. This field covers both front-end development (what users see) and back-end development (server-side logic and databases).

- id: cybersecurity
  domain: cs
  title: cybersecurity
  brief: Learn how to protect systems, networks, and data from cyber threats and attacks.
  description: Cybersecurity is the practice of protecting computer systems, networks, and data from unauthorized access, attacks, and damage. It involves implementing security measures, monitoring for threats, and responding to incidents to ensure the confidentiality, integrity, and availability of information.

- id: software-development
  domain: cs
  title: software development
  brief: Learn practical programming with modern systems and application languages.
  description: Software development focuses on designing, building, and maintaining software applications with strong foundations in language fluency, tooling, and implementation patterns.

- id: systems-programming
  domain: cs
  title: systems programming
  brief: Learn operating systems, low-level code, and close-to-hardware software.
  description: Systems programming covers operating systems, kernels, device interfaces, and low-level software that directly manages machine resources.

- id: computer-architecture
  domain: cs
  title: computer architecture and hardware
  brief: Learn how CPU and memory systems influence software behavior.
  description: This field focuses on processor behavior, memory hierarchies, and architecture-level performance concepts that help programmers write efficient software.

- id: language-implementation
  domain: cs
  title: language implementation
  brief: Learn how compilers and interpreters turn source code into execution.
  description: Language implementation includes parsing, intermediate representations, optimization, runtime models, and execution engines.

- id: algorithms-and-data-structures
  domain: cs
  title: algorithms and data structures
  brief: Learn the core algorithmic patterns and data representations of computer science.
  description: This field develops problem-solving skill through foundational data structures, algorithm design, and complexity analysis.

- id: computational-science
  domain: cs
  title: computational science
  brief: Learn computational methods applied to biology and signal analysis.
  description: Computational science applies programming and algorithms to scientific domains such as bioinformatics and digital signal processing.

- id: music-foundations
  domain: music
  title: music foundations
  brief: Learn conceptual and theoretical foundations of music.
  description: Music foundations cover notation, rhythm, melody, harmony, and form as a basis for listening, analysis, and composition.

- id: mathematics
  domain: science
  title: mathematics
  brief: Learn quantitative foundations for science and engineering.
  description: Mathematics develops symbolic, analytical, and statistical reasoning used across scientific and technical disciplines.

- id: life-sciences
  domain: science
  title: life sciences
  brief: Learn biological systems from anatomy to neuroscience.
  description: Life sciences study living organisms, from cellular and anatomical structure to behavior and neural function.

- id: physical-sciences
  domain: science
  title: physical sciences
  brief: Learn chemistry and physics as foundations of material and natural systems.
  description: Physical sciences explain matter, energy, and interactions through chemical and physical principles and quantitative models.

- id: drawing-fundamentals
  domain: art
  title: drawing fundamentals
  brief: Learn core skills in perspective and observational drawing.
  description: Drawing fundamentals build spatial reasoning, line control, and form construction through structured visual practice.

- id: figure-studies
  domain: art
  title: figure studies
  brief: Learn figure drawing, anatomy, and human form construction.
  description: Figure studies develop gesture, proportion, structure, and anatomical understanding for drawing the human body effectively.