<!DOCTYPE html>

<!-- This is a sidebar for free learning resources. It is included in each page of the free learning section of the site. -->
<!-- This sidebar will contain a hierarchical list of links to the page for each domain, each field, and each topic within the free learning section. -->
<!-- The hierarchy is -->
<!-- Domain -->
<!--   Field -->
<!--     Topic -->
<!-- These are read from the appropriate data files. stored in _data/freelearning .yml files-->

<!-- make a flex object that can be opened and closed as a side bar, 
    in the actual page this will be part of a flex container, use inline styling-->

<!-- The sidebar should have a hamburger icon that can toggle its visibility-->


<div style="flex: 0 0 250px; background-color: #f5f5f5; padding: 20px; border-right: 1px solid #ddd;" id="free-learning-sidebar">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <button id="toggle-sidebar" style="background: none; border: none; font-size: 24px; cursor: pointer;" onclick="document.getElementById('sidebar-content').style.display = document.getElementById('sidebar-content').style.display === 'none' ? 'block' : 'none';">&#9776;</button>
    </div>
    <div id="sidebar-content" style="display: block;">
    <h2>Free Learning Resources</h2>
    <ul>
    {% for domain in site.data.freelearning.domains %}
      <li>
        <a href="freelearning/{{ domain.id }}">{{ domain.id }}</a>
        <ul>
          {% for field in domain.fields %}
            <li>
              <a href="freelearning/{{ domain.id }}/{{ field.id }}">{{ field.id }}</a>
              <ul>
                {% for topic in field.topics %}
                  <li><a href="freelearning/{{ domain.id }}/{{ field.id }}/{{ topic.id }}">{{ topic.id }}</a></li>
                {% endfor %}
              </ul>
            </li>
          {% endfor %}
        </ul>
      </li>
    {% endfor %}
  </ul>
  </div>
</div>
