<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ page.title }}</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                color: #040f0f;
            }

            a::visited {
                color: #654d79;
            }

            a:link {
                color: #d45709;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div id="page-header" style="background-color: #2b303a; color: #fbfbff; padding: 20px;">
            <div style="display: flex; justify-content: center; align-items: center; position: relative;">
                <a href="{{ '/learning' | absolute_url }}" style="color: #fbfbff; text-decoration: none; font-size: 24px; position: absolute; left: 20px;">Home</a>
                <h1 style="margin: 0;">{{ page.title }}</h1>
            </div>
        </div>
        <div style="display: flex; flex-direction: row; min-height: 100vh; background-color: #fbfbff;">
            {% include freelearningsidebar.html %}
            <div style="flex: 1; padding: 20px;">
                {{ content }}
            </div>
        </div>
    </body>
</html>
